name: Build Docker Image

on:
  push:
    branches:
      - "dev/**"
      - "main"
      - "rel/**"
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.json"
      - "**.props"
      - "**.sln"
      - "CHANGELOG.md"
      - "**.Dockerfile"
      - "**/docker.yml"
  workflow_dispatch:
  schedule:
  # once a day at 02:00 UTC to cleanup old runs
    - cron: "0 2 * * *"

jobs:
  cleanup:
    name: Cleanup Runs
    if: ${{ github.event_name == 'schedule' }}
    permissions:
      actions: write
    uses: dotnet/arcade/.github/workflows/scheduled-action-cleanup-base.yml@main
    with:
      repository_owners: ${{ github.repository_owner }}

  extract_meta:
    name: Extract metadata for use
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-slim
    permissions:
      checks: write
      contents: read
    outputs:
      environment: ${{ steps.get-environment.outputs.environment }}
      environment_alpine: ${{ steps.get-environment.outputs.environment_alpine }}
      config: ${{ steps.get-config.outputs.config }}
      dockerfile: ${{ steps.get-dockerfile.outputs.dockerfile }}
      dockerfile_alpine: ${{ steps.get-dockerfile.outputs.dockerfile_alpine }}
      datetime: ${{ steps.build-metadata.outputs.datetime }}
      loc_cs: ${{ steps.build-metadata.outputs.loc_cs }}
      tags_ubuntu: ${{ steps.meta-ubuntu.outputs.tags }}
      labels_ubuntu: ${{ steps.meta-ubuntu.outputs.labels }}
      tags_alpine: ${{ steps.meta-alpine.outputs.tags }}
      labels_alpine: ${{ steps.meta-alpine.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get build environment
        id: get-environment
        env:
          IS_RELEASE_BRANCH: ${{ contains(github.event.head_commit.message, '[release]') || contains(github.event.head_commit.message, '[pre-release]') || contains(github.event.ref, 'rel/') || contains(github.event.ref, 'dev/') || contains(github.event.ref, 'dependabot/') }}
          IS_MAIN_NON_RELEASE: ${{ contains(github.ref_name, 'main') && (!contains(github.event.head_commit.message, '[pre-release]') || !contains(github.event.head_commit.message, '[release]')) }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          SAFE_REF_NAME="$(printf '%s' "$REF_NAME" | tr -c 'a-zA-Z0-9._-' '-')"
          if [[ "$IS_RELEASE_BRANCH" == "true" ]]; then
            echo "environment=$SAFE_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "environment_alpine=$SAFE_REF_NAME-alpine" >> "$GITHUB_OUTPUT"
          elif [[ "$IS_MAIN_NON_RELEASE" == "true" ]]; then
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "environment_alpine=dev-alpine" >> "$GITHUB_OUTPUT"
          else
            # Fallback for branches outside dev/**, rel/**, dependabot/**, main
            # (e.g. a manual workflow_dispatch run on a feature branch) so the
            # Docker tag is never empty.
            echo "environment=$SAFE_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "environment_alpine=$SAFE_REF_NAME-alpine" >> "$GITHUB_OUTPUT"
          fi

      - name: Get build config
        id: get-config
        env:
          IS_RELEASE: ${{ contains(github.event.head_commit.message, '[release]') || contains(github.event.head_commit.message, '[pre-release]') || contains(github.event.ref, 'rel/') }}
        run: |
          if [[ "$IS_RELEASE" == "true" ]]; then
            echo "config=Docker" >> "$GITHUB_OUTPUT"
          else
            echo "config=Docker-debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Get correct Dockerfile
        id: get-dockerfile
        env:
          BUILD_CONFIG: ${{ steps.get-config.outputs.config }}
        run: |
          if [[ "$BUILD_CONFIG" == "Docker" ]]; then
            echo "dockerfile=release.Dockerfile" >> "$GITHUB_OUTPUT"
            echo "dockerfile_alpine=release.alpine.Dockerfile" >> "$GITHUB_OUTPUT"
          else
            echo "dockerfile=dev.Dockerfile" >> "$GITHUB_OUTPUT"
            echo "dockerfile_alpine=dev.alpine.Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      # Steps below call slow third-party actions (network I/O) — background them;
      # the steps above are pure in-memory conditionals with nothing to gain from backgrounding.
      - name: Get build metadata
        id: build-metadata
        background: true
        uses: ./.github/actions/build-metadata

      - name: Docker meta (ubuntu)
        id: meta-ubuntu
        background: true
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v3.6.1
        with:
          flavor: latest=${{ steps.get-config.outputs.config == 'Docker' || 'false' }}
          images: sellagh/azzybot
          tags: type=raw,value=${{ steps.get-environment.outputs.environment }}

      - name: Docker meta (alpine)
        id: meta-alpine
        background: true
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v3.6.1
        with:
          flavor: latest=false
          images: sellagh/azzybot
          tags: |
            type=raw,value=${{ steps.get-environment.outputs.environment_alpine }}
            ${{ steps.get-config.outputs.config == 'Docker' && 'type=raw,value=latest-alpine' || '' }}

      - name: Wait for all background work before job outputs are read
        wait-all: true

  docker-build-ubuntu:
    name: Build Docker Image For ubuntu - ${{ matrix.arch }}
    needs: [extract_meta]
    runs-on: ubuntu-24.04${{ matrix.arch == 'arm64' && '-arm' || '' }}
    permissions:
      checks: write
      contents: read
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Replace values in files
        background: true
        env:
          COMMIT_SHA: ${{ github.sha }}
          BUILD_DATETIME: ${{ needs.extract_meta.outputs.datetime }}
          LOC_CS: ${{ needs.extract_meta.outputs.loc_cs }}
        run: |
          sed -i "s\Commit not found\\$COMMIT_SHA\g" ./src/AzzyBot.Bot/Modules/Core/Files/AppStats.json
          sed -i "s\Compilation date not found\\$BUILD_DATETIME\g" ./src/AzzyBot.Bot/Modules/Core/Files/AppStats.json
          sed -i "s\Lines of source code not found\\$LOC_CS\g" ./src/AzzyBot.Bot/Modules/Core/Files/AppStats.json

      - name: Docker login and buildx setup
        background: true
        uses: ./.github/actions/docker-login-buildx
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Wait for prep steps before building
        wait-all: true

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          build-args: |
            CONFIG=${{ needs.extract_meta.outputs.config }}
          context: .
          file: ${{ needs.extract_meta.outputs.dockerfile }}
          labels: ${{ needs.extract_meta.outputs.labels_ubuntu }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=sellagh/azzybot,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-ubuntu-${{ matrix.arch }}-${{ needs.extract_meta.outputs.config }}
          cache-to: type=gha,scope=docker-ubuntu-${{ matrix.arch }}-${{ needs.extract_meta.outputs.config }},mode=max

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          digest="$BUILD_DIGEST"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ubuntu-linux-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-build-alpine:
    name: Build Docker Image For alpine - ${{ matrix.arch }}
    needs: [extract_meta]
    runs-on: ubuntu-24.04${{ matrix.arch == 'arm64' && '-arm' || '' }}
    permissions:
      checks: write
      contents: read
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Replace values in files
        background: true
        env:
          COMMIT_SHA: ${{ github.sha }}
          BUILD_DATETIME: ${{ needs.extract_meta.outputs.datetime }}
          LOC_CS: ${{ needs.extract_meta.outputs.loc_cs }}
        run: |
          sed -i "s\Commit not found\\$COMMIT_SHA\g" ./src/AzzyBot.Bot/Modules/Core/Files/AppStats.json
          sed -i "s\Compilation date not found\\$BUILD_DATETIME\g" ./src/AzzyBot.Bot/Modules/Core/Files/AppStats.json
          sed -i "s\Lines of source code not found\\$LOC_CS\g" ./src/AzzyBot.Bot/Modules/Core/Files/AppStats.json

      - name: Docker login and buildx setup
        background: true
        uses: ./.github/actions/docker-login-buildx
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Wait for prep steps before building
        wait-all: true

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          build-args: |
            CONFIG=${{ needs.extract_meta.outputs.config }}
          context: .
          file: ${{ needs.extract_meta.outputs.dockerfile_alpine }}
          labels: ${{ needs.extract_meta.outputs.labels_alpine }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=sellagh/azzybot,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-alpine-${{ matrix.arch }}-${{ needs.extract_meta.outputs.config }}
          cache-to: type=gha,scope=docker-alpine-${{ matrix.arch }}-${{ needs.extract_meta.outputs.config }},mode=max

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          digest="$BUILD_DIGEST"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alpine-linux-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-ubuntu:
    name: Creating Docker Release (ubuntu)
    runs-on: ubuntu-24.04
    needs: [extract_meta, docker-build-ubuntu]
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: ubuntu-*
          merge-multiple: true

      - name: Docker login and buildx setup
        uses: ./.github/actions/docker-login-buildx
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          DOCKER_TAGS: ${{ needs.extract_meta.outputs.tags_ubuntu }}
        run: |
          docker buildx imagetools create $(printf '%s\n' "$DOCKER_TAGS" | sed '/^$/d' | sed 's/^/-t /' | tr '\n' ' ') \
            $(printf 'sellagh/azzybot@sha256:%s ' *)

  merge-alpine:
    name: Creating Docker Release (alpine)
    runs-on: ubuntu-24.04
    needs: [extract_meta, docker-build-alpine]
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: alpine-*
          merge-multiple: true

      - name: Docker login and buildx setup
        uses: ./.github/actions/docker-login-buildx
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          DOCKER_TAGS: ${{ needs.extract_meta.outputs.tags_alpine }}
        run: |
          docker buildx imagetools create $(printf '%s\n' "$DOCKER_TAGS" | sed '/^$/d' | sed 's/^/-t /' | tr '\n' ' ') \
            $(printf 'sellagh/azzybot@sha256:%s ' *)
