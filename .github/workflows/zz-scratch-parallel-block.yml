name: "[SCRATCH] background on uses: step + cancel test"

on:
  workflow_dispatch:
  push:
    branches:
      - "claude/github-actions-optimization-bwsl2j"
    paths:
      - ".github/workflows/zz-scratch-parallel-block.yml"

jobs:
  test:
    name: Test background on uses step, and cancel
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: "Checkout (background, a uses: step)"
        id: checkout
        background: true
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Start a long-lived background service
        id: service
        background: true
        run: |
          echo "pretend service starting"
          sleep 60

      - name: Wait for checkout only
        wait: checkout

      - name: Confirm checkout completed (workspace has files)
        run: |
          if [[ ! -f "AzzyBot.slnx" ]]; then
            echo "::error::checkout (background uses: step) did not complete before wait returned"
            exit 1
          fi
          echo "SUCCESS: background works on a uses: step"

      - name: Cancel the long-lived service
        cancel: service

      - name: Done
        run: echo "SUCCESS - cancel accepted"
