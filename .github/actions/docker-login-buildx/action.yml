# Requires actions/checkout to have run earlier in the calling job — this is a
# local composite action and its action.yml must exist in the checked-out workspace.
name: "Docker Login and Buildx Setup"
description: "Logs into Docker Hub and sets up Docker Buildx. Requires actions/checkout to run first in the caller."

inputs:
  dockerhub-username:
    description: "Docker Hub username"
    required: true
  dockerhub-password:
    description: "Docker Hub password/token"
    required: true

runs:
  using: "composite"
  steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-password }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
