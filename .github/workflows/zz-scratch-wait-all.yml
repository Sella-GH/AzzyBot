name: "[SCRATCH] wait-all test"

on:
  workflow_dispatch:
  push:
    branches:
      - "claude/github-actions-optimization-bwsl2j"
    paths:
      - ".github/workflows/zz-scratch-wait-all.yml"

jobs:
  test:
    name: Test wait-all
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - name: Background step A
        id: a
        background: true
        run: |
          sleep 6
          echo "a=done" >> "$GITHUB_OUTPUT"

      - name: Background step B
        id: b
        background: true
        run: |
          sleep 3
          echo "b=done" >> "$GITHUB_OUTPUT"

      - name: Wait for all background steps
        wait-all: true

      - name: Confirm both outputs available
        env:
          A_OUT: ${{ steps.a.outputs.a }}
          B_OUT: ${{ steps.b.outputs.b }}
        run: |
          echo "a.outputs.a='$A_OUT' b.outputs.b='$B_OUT'"
          if [[ "$A_OUT" != "done" || "$B_OUT" != "done" ]]; then
            echo "::error::wait-all did not make both outputs available"
            exit 1
          fi
          echo "SUCCESS: wait-all works on ubuntu-slim"
